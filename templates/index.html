<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Local to Public</title>
    <style>
        :root {
            color-scheme: dark;
            font-family: Inter, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        }

        body {
            margin: 0;
            min-height: 100vh;
            display: grid;
            place-items: center;
            background: linear-gradient(135deg, #0f172a, #1e293b);
            color: #f8fafc;
        }

        .card {
            width: min(92vw, 720px);
            padding: 2rem;
            border-radius: 20px;
            background: rgba(15, 23, 42, 0.8);
            border: 1px solid rgba(148, 163, 184, 0.2);
            box-shadow: 0 20px 50px rgba(15, 23, 42, 0.3);
        }

        h1 {
            margin: 0 0 0.75rem;
            font-size: clamp(1.8rem, 3vw, 2.6rem);
        }

        p {
            line-height: 1.6;
            color: #cbd5e1;
        }

        code {
            display: inline-block;
            padding: 0.2rem 0.45rem;
            border-radius: 6px;
            background: #334155;
            color: #e2e8f0;
        }

        .steps {
            margin-top: 1.2rem;
            padding-left: 1.1rem;
        }

        .steps li + li {
            margin-top: 0.5rem;
        }
    </style>
</head>
<body>
    <main class="card">
        <h1>Local to Public</h1>
        <p>Share your local development server with the world in a few seconds.</p>

        <ol class="steps">
            <li>Install the CLI: <code>pip install local2public</code></li>
            <li>Start your app locally on a port, for example <code>ltp --port 8000 --name my-site</code></li>
            <li>Open the generated public URL, for example <code>https://my-site.myurl.com/</code></li>
        </ol>
    </main>
</body>
</html>
